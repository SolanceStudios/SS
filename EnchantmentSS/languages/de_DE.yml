toxicstrike:
  name: "§l&#11A100T&#109900o&#109200x&#0F8A00i&#0F8200c &#0E7300S&#0D6C00t&#0D6400r&#0C5C00i&#0C5500k&#0B4D00e"
  description: "&7Beim Treffer besteht eine Chance, den Gegner zu vergiften und seine Lebenspunkte langsam zu entziehen."
  level-1: "&aStufe I:&7 40% Chance, entzieht 0,5 Herzen für 5 Sekunden."
  level-2: "&aStufe II:&7 25% Chance, entzieht 1 Herz für 6 Sekunden."
  level-3: "&aStufe III:&7 10% Chance, entzieht 2 Herzen für 8 Sekunden."
  trigger: "&7Auslöser:&f beim Angriff auf eine Entität."
  sound: "&7Sound:&f LEVEL_UP"

bleed:
  name: "§l&#A10000B&#8C0000l&#770000e&#620000e&#4D0000d"
  description: "&7Nach einem Treffer beginnt der Gegner zu bluten und verliert mit der Zeit Leben."
  level-1: "&aStufe I:&7 45% Chance, entzieht 2 Leben alle 5 Sekunden."
  level-2: "&aStufe II:&7 30% Chance, entzieht 2,5 Leben alle 3 Sekunden."
  level-3: "&aStufe III:&7 10% Chance, entzieht 3 Leben alle 4 Sekunden."
  trigger: "&7Auslöser:&f beim Angriff auf eine Entität."
  visual: "&7Effekt:&f HEART-Partikel."
  sound: "&7Sound:&f ANVIL_LAND"

frosttouch:
  name: "§l&#00A17EF&#009879r&#008F74o&#00866Fs&#007D6At &#006C61T&#00635Co&#005A57u&#005152c&#00484Dh"
  description: "&7Beim Treffer wird der Gegner verlangsamt und kurzzeitig eingefroren."
  level-1: "&aStufe I:&7 12% Chance, friert für 5 Sekunden ein."
  trigger: "&7Auslöser:&f beim Angriff auf eine Entität."
  sound: "&7Sound:&f BLOCK_BEACON_ACTIVATE"

electrocute:
  name: "§l&#00BAFFE&#00ADF2l&#00A1E5e&#0094D7c&#0088CAt&#007BBDr&#006EB0o&#0062A3c&#005595u&#004988t&#003C7Be"
  description: "&7Beim Treffer besteht eine Chance, elektrischen Flächenschaden um das Ziel herum zu verursachen."
