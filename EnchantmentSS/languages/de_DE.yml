  level-2: "&aStufe II:&7 5% Chance, entzieht 5 Leben in einem 3x3x3-Bereich."
  trigger: "&7Auslöser:&f beim Angriff auf eine Entität."
  visual: "&7Effekt:&f CRIT-Partikel."
  sound: "&7Sound:&f EXPLODE"

mindwarp:
  name: "§l&#5C008EM&#65007Ei&#6E006Fn&#77005Fd &#8A003FW&#930030a&#9C0020r&#A50010p"
  description: "&7Verwirrt den Geist des Gegners und stört seine Bewegungen und Angriffe."
  level-1: "&aStufe I:&7 5% Chance, desorientiert für 5 Sekunden."
  trigger: "&7Auslöser:&f beim Angriff auf eine Entität."
  subtitle: "&cDU WURDEST DESORIENTIERT!"
  visual: "&7Effekt:&f EXPLOSION_NORMAL-Partikel."
  sound: "&7Sound:&f ENDERDRAGON_DEATH"

