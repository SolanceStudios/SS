  level-2: "&aLevel II:&7 25% chance, drains 1 heart for 6 seconds."
  level-3: "&aLevel III:&7 10% chance, drains 2 hearts for 8 seconds."
  trigger: "&7Trigger:&f when attacking an entity."
  sound: "&7Sound:&f LEVEL_UP"

