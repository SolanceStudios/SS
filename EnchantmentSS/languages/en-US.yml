  level-3: "&aLevel III:&7 10% chance, removes 3 health every 4 seconds."
  trigger: "&7Trigger:&f when attacking an entity."
  visual: "&7Visual:&f HEART particles."
  sound: "&7Sound:&f ANVIL_LAND"

