general:
  no-permission: "{prefix}&c✖ You do not have permission to do this."
  player-only: "{prefix}&c✖ This command can only be used by players."
  invalid-command: "{prefix}&e Invalid or wrong command."
  reloaded: "{prefix}&a✔ Plugin configuration and messages reloaded."
  reload-failed: "{prefix}&c✖ Failed to reload plugin configuration."

usage:
  main: "{prefix}&e Use /enchantmentss <enchant|reload>"
  enchant: "{prefix}&e Use /enchantmentss enchant <enchantment> <level>"
  reload: "{prefix}&e Use /enchantmentss reload"

enchant:
  success: "{prefix}&a✔ Item successfully enchanted!"
  no-item-in-hand: "{prefix}&c✖ Failed to enchant. You must hold an item."
  level-not-available: "{prefix}&e Enchantment level is not available."
  enchantment-not-found: "{prefix}&c✖ Unknown enchantment name."
  incompatible-item: "{prefix}&c✖ This enchantment cannot be applied to this item."

update:
  up-to-date: "{prefix}&a✔ You are using the latest plugin version &f{current}&a."
  outdated: "{prefix}&e⚠ A new plugin version is available! Current: &f{current}&e, Latest: &f{latest}&e."
  error: "{prefix}&c✖ Could not check for plugin updates at this time."

toxicstrike:
  name: "§l&#11A100T&#109900o&#109200x&#0F8A00i&#0F8200c &#0E7300S&#0D6C00t&#0D6400r&#0C5C00i&#0C5500k&#0B4D00e"
