toxicstrike:
  name: "§l&#11A100T&#109900o&#109200x&#0F8A00i&#0F8200c &#0E7300S&#0D6C00t&#0D6400r&#0C5C00i&#0C5500k&#0B4D00e"
  description: "&7攻撃時に一定の確率で敵を毒状態にし、徐々に体力を奪います。"
  level-1: "&aレベル I:&7 40% の確率で 5 秒間 0.5 ハートずつダメージ。"
  level-2: "&aレベル II:&7 25% の確率で 6 秒間 1 ハートずつダメージ。"
  level-3: "&aレベル III:&7 10% の確率で 8 秒間 2 ハートずつダメージ。"
  trigger: "&7トリガー:&f エンティティ攻撃時。"
  sound: "&7サウンド:&f LEVEL_UP"

bleed:
  name: "§l&#A10000B&#8C0000l&#770000e&#620000e&#4D0000d"
  description: "&7攻撃後、敵は出血し始め、一定間隔で体力を失います。"
  level-1: "&aレベル I:&7 45% の確率で 5 秒ごとに 2 の体力を減少。"
  level-2: "&aレベル II:&7 30% の確率で 3 秒ごとに 2.5 の体力を減少。"
  level-3: "&aレベル III:&7 10% の確率で 4 秒ごとに 3 の体力を減少。"
  trigger: "&7トリガー:&f エンティティ攻撃時。"
  visual: "&7ビジュアル:&f HEART パーティクル。"
  sound: "&7サウンド:&f ANVIL_LAND"

frosttouch:
  name: "§l&#00A17EF&#009879r&#008F74o&#00866Fs&#007D6At &#006C61T&#00635Co&#005A57u&#005152c&#00484Dh"
  description: "&7攻撃時に敵をスロウおよび一時的な凍結状態にします。"
  level-1: "&aレベル I:&7 12% の確率で 5 秒間凍結。"
  trigger: "&7トリガー:&f エンティティ攻撃時。"
  sound: "&7サウンド:&f BLOCK_BEACON_ACTIVATE"

electrocute:
  name: "§l&#00BAFFE&#00ADF2l&#00A1E5e&#0094D7c&#0088CAt&#007BBDr&#006EB0o&#0062A3c&#005595u&#004988t&#003C7Be"
  description: "&7攻撃時に一定の確率でターゲット周囲に雷撃ダメージを与えます。"
  level-1: "&aレベル I:&7 20% の確率で 2x2x2 範囲に 3 のダメージ。"
  level-2: "&aレベル II:&7 5% の確率で 3x3x3 範囲に 5 のダメージ。"
  trigger: "&7トリガー:&f エンティティ攻撃時。"
  visual: "&7ビジュアル:&f CRIT パーティクル。"
  sound: "&7サウンド:&f EXPLODE"

mindwarp:
  name: "§l&#5C008EM&#65007Ei&#6E006Fn&#77005Fd &#8A003FW&#930030a&#9C0020r&#A50010p"
  description: "&7敵の精神を混乱させ、移動と攻撃を狂わせます。"
  level-1: "&aレベル I:&7 5% の確率で 5 秒間混乱させます。"
  trigger: "&7トリガー:&f エンティティ攻撃時。"
  subtitle: "&cあなたは混乱させられた！"
  visual: "&7ビジュアル:&f EXPLOSION_NORMAL パーティクル。"
  sound: "&7サウンド:&f ENDERDRAGON_DEATH"

