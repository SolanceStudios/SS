toxicstrike:
  name: "§l&#11A100T&#109900o&#109200x&#0F8A00i&#0F8200c &#0E7300S&#0D6C00t&#0D6400r&#0C5C00i&#0C5500k&#0B4D00e"
  description: "&7При ударе есть шанс отравить противника и медленно снижать его здоровье."
  level-1: "&aУровень I:&7 40% шанс, отнимает 0,5 сердца в течение 5 секунд."
  level-2: "&aУровень II:&7 25% шанс, отнимает 1 сердце в течение 6 секунд."
  level-3: "&aУровень III:&7 10% шанс, отнимает 2 сердца в течение 8 секунд."
  trigger: "&7Триггер:&f при атаке сущности."
  sound: "&7Звук:&f LEVEL_UP"

bleed:
  name: "§l&#A10000B&#8C0000l&#770000e&#620000e&#4D0000d"
  description: "&7После удара противник начинает истекать кровью и теряет здоровье со временем."
  level-1: "&aУровень I:&7 45% шанс, отнимает 2 единицы здоровья каждые 5 секунд."
  level-2: "&aУровень II:&7 30% шанс, отнимает 2,5 единицы здоровья каждые 3 секунды."
  level-3: "&aУровень III:&7 10% шанс, отнимает 3 единицы здоровья каждые 4 секунды."
  trigger: "&7Триггер:&f при атаке сущности."
  visual: "&7Эффект:&f частицы HEART."
  sound: "&7Звук:&f ANVIL_LAND"

frosttouch:
  name: "§l&#00A17EF&#009879r&#008F74o&#00866Fs&#007D6At &#006C61T&#00635Co&#005A57u&#005152c&#00484Dh"
  description: "&7При ударе замедляет и временно замораживает противника."
  level-1: "&aУровень I:&7 12% шанс, замораживает на 5 секунд."
  trigger: "&7Триггер:&f при атаке сущности."
  sound: "&7Звук:&f BLOCK_BEACON_ACTIVATE"

electrocute:
  name: "§l&#00BAFFE&#00ADF2l&#00A1E5e&#0094D7c&#0088CAt&#007BBDr&#006EB0o&#0062A3c&#005595u&#004988t&#003C7Be"
  description: "&7При ударе есть шанс нанести электрический урон по области вокруг цели."
  level-1: "&aУровень I:&7 20% шанс, отнимает 3 единицы здоровья в области 2x2x2."
  level-2: "&aУровень II:&7 5% шанс, отнимает 5 единиц здоровья в области 3x3x3."
  trigger: "&7Триггер:&f при атаке сущности."
  visual: "&7Эффект:&f частицы CRIT."
  sound: "&7Звук:&f EXPLODE"

mindwarp:
  name: "§l&#5C008EM&#65007Ei&#6E006Fn&#77005Fd &#8A003FW&#930030a&#9C0020r&#A50010p"
  description: "&7Искажает сознание противника, нарушая его движения и атаки."
  level-1: "&aУровень I:&7 5% шанс, дезориентирует на 5 секунд."
  trigger: "&7Триггер:&f при атаке сущности."
  subtitle: "&cВЫ БЫЛИ ДЕЗОРИЕНТИРОВАНЫ!"
  visual: "&7Эффект:&f частицы EXPLOSION_NORMAL."
  sound: "&7Звук:&f ENDERDRAGON_DEATH"

